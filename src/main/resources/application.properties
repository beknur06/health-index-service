spring.application.name=health-index-service
server.port=8083

# ──────────────────────────────────────
# RabbitMQ
# ──────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=4
spring.rabbitmq.listener.simple.prefetch=50

rabbitmq.queue.health-index=telemetry.health-index

# ──────────────────────────────────────
# Redis
# ──────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

redis.channel.health=health
redis.key.health-prefix=health_index
redis.key.ttl-seconds=300

# ──────────────────────────────────────
# PostgreSQL (config + snapshots)
# ──────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/digitaltwin
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASS:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ──────────────────────────────────────
# Health Index calculation
# ──────────────────────────────────────
health-index.snapshot-interval-seconds=10
health-index.trend-window-size=30

# ──────────────────────────────────────
# Actuator
# ──────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
